<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>vCard Test</title></head>
<body style="font-family:sans-serif;padding:20px;max-width:400px;margin:0 auto;">
<h2>vCard Import Tests</h2>
<p style="font-size:12px;color:#666;">Tap each button. If Android imports it, that format works.</p>

<button onclick="test1()" style="display:block;width:100%;padding:12px;margin:10px 0;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;">Test 1: Bare minimum</button>
<button onclick="test2()" style="display:block;width:100%;padding:12px;margin:10px 0;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;">Test 2: Name + Email + Phone</button>
<button onclick="test3()" style="display:block;width:100%;padding:12px;margin:10px 0;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;">Test 3: All fields no photo</button>
<button onclick="test4()" style="display:block;width:100%;padding:12px;margin:10px 0;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;">Test 4: All fields + photo</button>
<button onclick="test5()" style="display:block;width:100%;padding:12px;margin:10px 0;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;">Test 5: Single URL only</button>

<pre id="output" style="margin-top:20px;padding:10px;background:#f3f4f6;border-radius:8px;font-size:10px;white-space:pre-wrap;word-break:break-all;"></pre>

<script>
function dl(vcf, name) {
  document.getElementById('output').textContent = vcf;

  // Method A: Navigate directly to data URI (opens contacts app on Android)
  var btn = document.createElement('a');
  btn.href = 'data:text/x-vcard,' + encodeURIComponent(vcf);
  btn.textContent = '→ Tap here to open in Contacts';
  btn.style.cssText = 'display:block;padding:12px;margin:10px 0;background:#16a34a;color:#fff;border-radius:8px;text-align:center;text-decoration:none;font-size:14px;';
  document.getElementById('output').before(btn);

  // Method B: Blob download
  var blob = new Blob([vcf], {type: 'text/x-vcard'});
  var url = URL.createObjectURL(blob);
  var btn2 = document.createElement('a');
  btn2.href = url;
  btn2.download = name + '.vcf';
  btn2.textContent = '→ Download .vcf file';
  btn2.style.cssText = 'display:block;padding:12px;margin:10px 0;background:#e67e22;color:#fff;border-radius:8px;text-align:center;text-decoration:none;font-size:14px;';
  document.getElementById('output').before(btn2);
}

function test1() {
  dl("BEGIN:VCARD\r\nVERSION:3.0\r\nN:Test;;;;\r\nFN:Test\r\nEND:VCARD\r\n", "test1");
}

function test2() {
  dl("BEGIN:VCARD\r\nVERSION:3.0\r\nN:Miller;Jacob;;;\r\nFN:Jacob Miller\r\nEMAIL:jacob@test.com\r\nTEL:+1234567890\r\nEND:VCARD\r\n", "test2");
}

function test3() {
  dl("BEGIN:VCARD\r\nVERSION:3.0\r\nN:Miller;Jacob;;;\r\nFN:Jacob Miller\r\nORG:Ergodic Solutions\r\nTITLE:Asia GM\r\nEMAIL:jacob@test.com\r\nTEL:+8615900898907\r\nURL:https://www.linkedin.com/in/jacobamiller/\r\nNOTE:Met at Singapore event\r\nEND:VCARD\r\n", "test3");
}

function test4() {
  dl("BEGIN:VCARD\r\nVERSION:3.0\r\nN:Miller;Jacob;;;\r\nFN:Jacob Miller\r\nORG:Ergodic Solutions\r\nTITLE:Asia GM\r\nEMAIL:jacob@test.com\r\nTEL:+8615900898907\r\nURL:https://www.linkedin.com/in/jacobamiller/\r\nPHOTO;VALUE=URI:https://avatars.githubusercontent.com/u/24448077\r\nNOTE:Met at Singapore event\r\nEND:VCARD\r\n", "test4");
}

function test5() {
  dl("BEGIN:VCARD\r\nVERSION:3.0\r\nN:Miller;Jacob;;;\r\nFN:Jacob Miller\r\nORG:Ergodic Solutions\r\nTITLE:Asia GM\r\nEMAIL:jacob@test.com\r\nTEL:+8615900898907\r\nURL:https://www.linkedin.com/in/jacobamiller/\r\nNOTE:Met at Singapore event. Website: https://www.ErgodicSolutions.com\r\nEND:VCARD\r\n", "test5");
}
</script>
</body>
</html>
